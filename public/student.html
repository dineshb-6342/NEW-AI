<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ask Doubt - Anonymous Doubt System</title>
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 50%, #1a1a1a 100%);
      min-height: 100vh;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Deep Gray & Neon Green Container */
    .container {
      width: 100%;
      max-width: 500px;
      background: rgba(26, 26, 26, 0.95);
      border: 2px solid rgba(0, 255, 136, 0.3);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 0 40px rgba(0, 255, 136, 0.15);
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #00ff88, #00cc6a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
    }

    /* Student Info Badge */
    .student-badge {
      background: rgba(0, 255, 136, 0.1);
      border: 1px solid rgba(0, 255, 136, 0.3);
      border-radius: 10px;
      padding: 12px 20px;
      margin-bottom: 25px;
      text-align: center;
    }

    .student-badge .label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 5px;
    }

    .student-badge .name {
      font-size: 18px;
      font-weight: 600;
      color: #00ff88;
    }

    /* Form */
    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 10px;
      color: rgba(255, 255, 255, 0.9);
    }

    /* Dark Textarea */
    textarea {
      width: 100%;
      min-height: 150px;
      padding: 15px;
      font-size: 16px;
      background: #1a1a1a;
      border: 2px solid rgba(0, 255, 136, 0.3);
      border-radius: 12px;
      color: #fff;
      resize: vertical;
      transition: all 0.3s ease;
    }

    textarea:focus {
      outline: none;
      border-color: #00ff88;
      box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
    }

    textarea::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    /* Neon Green Submit Button */
    .submit-btn {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      font-weight: 600;
      background: linear-gradient(135deg, #00ff88, #00cc6a);
      color: #1a1a1a;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 255, 136, 0.4);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .submit-btn:disabled {
      background: rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.5);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Success Message */
    .success-message {
      display: none;
      background: rgba(0, 255, 136, 0.15);
      border: 2px solid rgba(0, 255, 136, 0.5);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      margin-top: 20px;
      animation: slideIn 0.5s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .success-message .icon {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .success-message h3 {
      color: #00ff88;
      font-size: 20px;
      margin-bottom: 5px;
    }

    .success-message p {
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
    }

    /* Error Message */
    .error-message {
      display: none;
      background: rgba(255, 107, 107, 0.15);
      border: 2px solid rgba(255, 107, 107, 0.5);
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      margin-top: 15px;
      color: #ff6b6b;
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid rgba(0, 255, 136, 0.2);
    }

    .footer p {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
    }

    /* Connection Status */
    .connection-status {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 8px 15px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .connection-status.connected {
      background: rgba(0, 255, 136, 0.2);
      color: #00ff88;
    }

    .connection-status.disconnected {
      background: rgba(255, 107, 107, 0.2);
      color: #ff6b6b;
    }

    .connection-status .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
    }

    /* Mobile Optimization */
    @media (max-width: 480px) {
      .container {
        padding: 20px;
        border-radius: 15px;
      }

      .header h1 {
        font-size: 24px;
      }

      textarea {
        min-height: 120px;
        font-size: 16px;
      }

      .submit-btn {
        padding: 14px;
        font-size: 16px;
      }

      .connection-status {
        top: 10px;
        right: 10px;
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <div class="connection-status connected" id="connectionStatus">
    <span class="dot"></span>
    <span id="statusText">Connected</span>
  </div>

  <div class="container">
    <div class="header">
      <h1>❓ Ask Your Doubt</h1>
      <p>Submit your question anonymously to the teacher</p>
    </div>

    <div class="student-badge">
      <div class="label">You are logged in as</div>
      <div class="name" id="studentName">Anonymous Student #1</div>
    </div>

    <form id="doubtForm">
      <div class="form-group">
        <label for="doubtText">Your Question:</label>
        <textarea 
          id="doubtText" 
          placeholder="Type your doubt here... (e.g., What is Newton's Third Law?)"
          maxlength="500"
          required
        ></textarea>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">
        📤 Submit Anonymously
      </button>
    </form>

    <div class="success-message" id="successMessage">
      <div class="icon">✅</div>
      <h3>Doubt Submitted!</h3>
      <p>Your question has been sent to the teacher anonymously.</p>
    </div>

    <div class="error-message" id="errorMessage"></div>

    <div class="footer">
      <p>Your identity is kept anonymous. Only the teacher can see your questions.</p>
    </div>
  </div>

  <script>
    // Get room ID from URL - extract from /join/:roomId
    const pathParts = window.location.pathname.split('/').filter(p => p);
    const roomId = pathParts[pathParts.length - 1] || 'class123';

    // Generate random anonymous student ID
    const studentId = Math.floor(Math.random() * 9000) + 1000;
    const studentName = `Anonymous Student #${studentId}`;
    document.getElementById('studentName').textContent = studentName;

    // Use dynamic server URL from the current page
    const serverUrl = window.location.origin;
    console.log('Connecting to:', serverUrl);

    // Initialize Socket.io with dynamic URL
    const socket = io(serverUrl);

    // Join room as student
    socket.emit('join_room', { roomId, role: 'student' });

    // Connection status handling
    socket.on('connect', () => {
      updateConnectionStatus(true);
      console.log('Socket Connected');
    });

    socket.on('disconnect', () => {
      updateConnectionStatus(false);
      console.log('Socket Disconnected');
    });

    // Connection error handling - ALERT user if connection fails
    socket.on('connect_error', (error) => {
      console.error('Connection Error:', error);
      alert('❌ Connection Failed!\n\nCould not connect to the server.\n\nPlease check:\n1. Is the teacher\'s server running?\n2. Are you on the same network?\n\nError: ' + error.message);
    });

    function updateConnectionStatus(connected) {
      const statusEl = document.getElementById('connectionStatus');
      const statusText = document.getElementById('statusText');
      
      if (connected) {
        statusEl.className = 'connection-status connected';
        statusText.textContent = 'Connected';
      } else {
        statusEl.className = 'connection-status disconnected';
        statusText.textContent = 'Disconnected';
      }
    }

    // Form submission
    const form = document.getElementById('doubtForm');
    const doubtText = document.getElementById('doubtText');
    const submitBtn = document.getElementById('submitBtn');
    const successMessage = document.getElementById('successMessage');
    const errorMessage = document.getElementById('errorMessage');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const doubt = doubtText.value.trim();
      
      if (!doubt) {
        showError('Please enter your doubt');
        return;
      }

      // Disable button during submission
      submitBtn.disabled = true;
      submitBtn.textContent = '⏳ Sending...';

      // Emit the doubt to the server
      socket.emit('send_doubt', {
        roomId,
        doubt,
        studentName
      });

      // Show success after a short delay
      setTimeout(() => {
        form.reset();
        showSuccess();
        submitBtn.disabled = false;
        submitBtn.textContent = '📤 Submit Anonymously';
      }, 500);
    });

    function showSuccess() {
      successMessage.style.display = 'block';
      errorMessage.style.display = 'none';
      
      // Auto-hide after 5 seconds
      setTimeout(() => {
        successMessage.style.display = 'none';
      }, 5000);
    }

    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.style.display = 'block';
      successMessage.style.display = 'none';
      
      setTimeout(() => {
        errorMessage.style.display = 'none';
      }, 3000);
    }

    // Character counter for textarea
    doubtText.addEventListener('input', function() {
      const remaining = 500 - this.value.length;
      if (remaining < 50) {
        this.style.borderColor = remaining < 10 ? '#ff6b6b' : '#ffa500';
      } else {
        this.style.borderColor = 'rgba(0, 255, 136, 0.3)';
      }
    });
  </script>
</body>
</html>
